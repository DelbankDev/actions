name: sast-scan
description: "Run SonarQube scan and optional quality gate check."

inputs:
  sonar-host-url:
    description: "SonarQube server URL."
    required: true
  sonar-token:
    description: "SonarQube token."
    required: true
  project-key:
    description: "SonarQube project key. If empty, computed as org:repo:branch."
    required: false
    default: ""
  project-base-dir:
    description: "Base directory of the source project."
    required: false
    default: "."
  args:
    description: "Extra sonar scanner arguments."
    required: false
    default: ""
  quality-gate:
    description: "When true, enforce SonarQube quality gate."
    required: false
    default: "false"
  quality-gate-timeout:
    description: "Timeout in seconds for quality gate wait."
    required: false
    default: "300"

runs:
  using: composite
  steps:
    - name: Resolve project key
      id: project_key
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.project-key }}" ]; then
          KEY="${{ inputs.project-key }}"
        else
          REPO="${GITHUB_REPOSITORY#*/}"
          ORG="${GITHUB_REPOSITORY%%/*}"
          BRANCH="${GITHUB_REF_NAME:-unknown}"
          KEY="${ORG}:${REPO}:${BRANCH}"
        fi
        echo "value=${KEY}" >> "$GITHUB_OUTPUT"

    - name: SonarQube scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
      with:
        projectBaseDir: ${{ inputs.project-base-dir }}
        args: >-
          -Dsonar.projectKey=${{ steps.project_key.outputs.value }}
          ${{ inputs.args }}

    - name: SonarQube quality gate
      if: ${{ inputs.quality-gate == 'true' }}
      uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
      timeout-minutes: 10
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
      with:
        pollingTimeoutSec: ${{ inputs.quality-gate-timeout }}
