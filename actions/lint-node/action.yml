name: lint-node
description: "Run lint command for a Node.js project."

inputs:
  working-directory:
    description: "Directory where lint command should run."
    required: false
    default: "."
  lint-command:
    description: "Lint command to execute."
    required: false
    default: "npm run lint"

runs:
  using: composite
  steps:
    - name: Run lint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.lint-command }}
