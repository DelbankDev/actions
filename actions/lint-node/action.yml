name: lint-node
description: "Run lint command for a Node.js project."

inputs:
  working-directory:
    description: "Directory where lint command should run."
    required: false
    default: "."
  lint-command:
    description: "Lint command to execute."
    required: false
    default: "npm run lint"
  enforce:
    description: "When true, lint errors fail the action. When false, lint errors are logged as warning."
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Run lint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set +e
        ${{ inputs.lint-command }}
        EXIT_CODE=$?
        set -e

        if [ "$EXIT_CODE" -ne 0 ]; then
          if [ "${{ inputs.enforce }}" = "true" ]; then
            echo "Lint failed and enforce=true; failing action."
            exit "$EXIT_CODE"
          fi

          echo "::warning::Lint failed, but enforce=false; continuing pipeline."
        fi
